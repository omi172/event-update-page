<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10 flex justify-center items-center min-h-screen">

  <div class="bg-white border border-black p-8 w-full max-w-3xl shadow-sm">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold mb-2">Event 1</h1>
      <p class="text-lg">Number of available seats: <span class="font-semibold">23</span></p>
    </div>

    <div class="border border-black p-6">
      <div class="flex flex-col md:flex-row gap-8">
        
        <div class="flex-shrink-0 flex justify-center items-center">
          <div class="w-48 h-48 border border-black flex justify-center items-center">
            <div class="w-32 h-32 border border-black rounded-full flex justify-center items-center italic">
              Image
            </div>
          </div>
        </div>

        <div class="flex-grow space-y-4">
          <div class="flex items-center gap-4">
            <label class="w-32 text-right font-medium">Name:</label>
            <input type="text" class="flex-grow border border-black p-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>

          <div class="flex items-center gap-4">
            <label class="w-32 text-right font-medium">Email:</label>
            <input type="email" class="flex-grow border border-black p-1">
          </div>

          <div class="flex items-center gap-4">
            <label class="w-32 text-right font-medium">Phone No.:</label>
            <input type="tel" class="flex-grow border border-black p-1">
          </div>

          <div class="flex items-center gap-4">
            <label class="w-40 text-right font-medium">Number of seats:</label>
            <select class="border border-black p-1 w-24">
              <option>1</option>
              <option selected>2</option>
              <option>3</option>
            </select>
          </div>

          <div class="flex items-center gap-4">
            <label class="w-40 text-right font-medium">Name of Attendee 2:</label>
            <input type="text" class="flex-grow border border-black p-1">
          </div>
        </div>
      </div>

      <div class="flex justify-center gap-10 mt-10">
        <button class="border border-black px-10 py-2 hover:bg-gray-100 transition-colors">
          Submit
        </button>
        <button class="border border-black px-10 py-2 hover:bg-gray-100 transition-colors">
          Cancel
        </button>
      </div>
    </div>
  </div>

</body>
</html>
